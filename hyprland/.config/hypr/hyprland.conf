
#== monitors ==#
monitor=DP-1,1920x1080@239.96, 0x0, 1
monitor=HDMI-A-1,1920x1080@144, -1080x-200, 1, transform, 3

#== programs ==#
$terminal = kitty
$fileManager = nemo
$menu = wofi --show drun

#== startup ==#
exec-once = hyprpaper
exec-once = waybar

#== environment ==#
env = QT_QPA_PLATFORMTHEME,qt6ct
env = XCURSOR_SIZE,18
# env = XDG_SESSION_TYPE,wayland
# env = XDG_SESSION_DESKTOP,Hyprland

#== visuals ==#
general {
    border_size = 1
    gaps_in = 2
    gaps_out = 4

    col.active_border = rgba(7dd3fcee) rgba(0369a1ee) 45deg
    col.inactive_border = rgba(262626ee)

    layout = dwindle
}

decoration {
    rounding = 5

    blur {
        enabled = true
        size = 10
        passes = 3
    }
}

animations {
    enabled = yes, please :)
    bezier = defaultBezier, 0.05, 0.9, 0.1, 1.05

    animation = windows, 1, 7, defaultBezier
    animation = windowsOut, 1, 7, default, popin 80%
    animation = border, 1, 10, default
    animation = borderangle, 1, 8, default
    animation = fade, 1, 7, default
    animation = workspaces, 1, 6, defaultBezier
}

dwindle {
    pseudotile = true
    preserve_split = true
}

misc {
    force_default_wallpaper = 0 
    disable_hyprland_logo = true
}


#== input ==#
input {
    kb_layout = de
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =

    follow_mouse = 1
    force_no_accel = 1
    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.

    touchpad {
        natural_scroll = false
    }
}

#== keybinds ==#
$mainMod = SUPER

bind = $mainMod, Q, exec, $terminal
bind = $mainMod, C, killactive,
bind = $mainMod SHIFT, M, exit,
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, V, togglefloating,
bind = alt, space, exec, $menu
bind = $mainMod, H, togglesplit,
bind = $mainMod, F, fullscreen,

# Move focus
bind = $mainMod, J, movefocus, l
bind = $mainMod, L, movefocus, r
bind = $mainMod, I, movefocus, u
bind = $mainMod, K, movefocus, d

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to a workspace
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Screenshots
bind = $mainMod SHIFT, S, exec, /usr/local/bin/screenshot-clipboard

# Scroll through workspaces
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Move/resize windows with dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Requires playerctl
bindl = $mainMod, Z, exec, playerctl next
bindl = $mainMod, R, exec, playerctl play-pause
bindl = $mainMod, T, exec, playerctl previous
